<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Upload - OE Market</title>
  </head>

  <body class="text-lg">
    <div class="container mx-auto">
      <!-- NAVBAR -->
      <nav class="bg-white shadow-md">
        <div
          class="container mx-auto flex justify-between items-center py-4 px-4"
        >
          <div class="text-2xl font-bold text-primary">OE Market</div>

          <ul class="hidden md:flex space-x-8 text-gray-700 font-medium">
            <li><a href="index.html">Home</a></li>
            <li><a href="service.html">Service</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>

          <!-- AUTH -->
          <div id="authSection">
            <a href="logIn.html" class="px-4 py-2">Log In</a>
            <a href="signUp.html" class="px-4 py-2">Sign Up</a>
          </div>

          <!-- USER -->
          <div id="userSection" class="hidden relative flex items-center gap-3">
            <span id="welcomeText" class="font-semibold text-gray-700"></span>
            <a
              href="saved.html"
              class="text-2xl transition transform hover:scale-110"
              >🛍</a
            >
            <img
              id="userAvatar"
              src="./image/profile.jpg"
              class="w-10 h-10 rounded-full cursor-pointer"
            />

            <!-- DROPDOWN -->
            <div
              id="dropdownMenu"
              class="hidden absolute right-0 top-12 bg-white shadow-lg rounded-lg w-32"
            >
              <button
                id="logoutBtn"
                class="block w-full text-left px-4 py-2 hover:bg-gray-100"
              >
                Logout
              </button>
            </div>
          </div>
        </div>
      </nav>
      <div class="container mx-auto pt-6">
        <!-- TITLE -->
        <h1 class="text-3xl font-bold mb-2">🛍 My Bag</h1>
        <div class="flex justify-end mt-6">
          <div class="bg-white shadow-md rounded-lg p-4 w-64 text-right">
            <p class="text-gray-600">Total</p>
            <h2 id="totalPrice" class="text-2xl font-bold">$0</h2>
          </div>
        </div>

        <!-- ITEMS GRID -->
        <div id="mySavedBody" class="grid md:grid-cols-3 gap-6"></div>

        <!-- EMPTY STATE -->
        <p id="emptyText" class="text-gray-500 text-center hidden">
          Your bag is empty 😢
        </p>
      </div>
      <div
        id="savedContainer"
        class="grid md:grid-cols-3 gap-6 px-4 py-8"
      ></div>

      
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/navbar.js"></script>
    <script src="js/saved.js"></script>
  </body>
</html>
