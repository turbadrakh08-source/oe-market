<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign Up - OE Market</title>
  </head>

  <body>
    <div class="h-screen flex items-center justify-center">
      <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
          <img src="image/logo-small.png" class="mx-auto h-20 w-auto" />
          <h2
            class="mt-10 text-center text-2xl font-bold tracking-tight text-gray-900"
          >
            Create your account
          </h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
          <form id="signupForm" class="space-y-6">
            <!-- USERNAME -->
            <div>
              <label class="block text-sm font-medium text-gray-900"
                >Username</label
              >
              <input
                id="username"
                type="text"
                required
                class="block w-full rounded-md px-3 py-1.5 border outline-none focus:ring-2 focus:ring-indigo-600"
              />
            </div>

            <!-- EMAIL -->
            <div>
              <label class="block text-sm font-medium text-gray-900"
                >Email</label
              >
              <input
                id="email"
                type="email"
                required
                class="block w-full rounded-md px-3 py-1.5 border outline-none focus:ring-2 focus:ring-indigo-600"
              />
            </div>

            <!-- PASSWORD -->
            <div>
              <label class="block text-sm font-medium text-gray-900"
                >Password</label
              >
              <input
                id="password"
                type="password"
                required
                class="block w-full rounded-md px-3 py-1.5 border outline-none focus:ring-2 focus:ring-indigo-600"
              />
            </div>

            <!-- IMAGE -->
            <div>
              <label class="block text-sm font-medium text-gray-900"
                >Profile Image (optional)</label
              >
              <input
                id="image"
                type="file"
                class="block w-full text-sm text-gray-500"
              />
            </div>

            <!-- BUTTON -->
            <div>
              <button
                type="submit"
                id="signupBtn"
                class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 font-semibold text-white hover:bg-indigo-500"
              >
                Sign Up
              </button>
            </div>
          </form>

          <p class="mt-6 text-center text-sm text-gray-500">
            Already have an account?
            <a href="logIn.html" class="text-indigo-600 font-semibold">Login</a>
          </p>
        </div>
      </div>
    </div>
  </body>
  <script src="js/signup.js"></script>
</html>
